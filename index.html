<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Kart Stats con Imagen Dinámica</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h1>Mario Kart Customizer</h1>
    
    <!-- COLUMNA IZQUIERDA: Formulario -->
    <form id="kartForm" class="controls-column">
        <!-- 1. SELECT (Ahora con IDs de texto para fácil mapeo) -->
        <div class="form-group">
            <label for="character">Selecciona tu Piloto:</label>
            <select id="character">
                <option value="mario" data-base="50">Mario (Base: 50)</option>
                <option value="bowser" data-base="70">Bowser (Base: 70)</option>
                <option value="toad" data-base="30">Toad (Base: 30)</option>
                <option value="peach" data-base="55">Peach (Base: 55)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Tipo de Neumáticos:</label>
            <div class="radio-group">
                <label class="option-label"><input type="radio" name="tires" value="15" checked> Estándar (+15)</label>
                <label class="option-label"><input type="radio" name="tires" value="25"> Slick (+25 Vel / -Peso)</label>
                <label class="option-label"><input type="radio" name="tires" value="5"> Madera (+5 Agil)</label>
            </div>
        </div>

        <div class="form-group">
            <label>Mejoras del Kart:</label>
            <div class="checkbox-group">
                <label class="option-label"><input type="checkbox" name="upgrades" value="15"> Super Champiñón (+15)</label>
                <label class="option-label"><input type="checkbox" name="upgrades" value="20"> Alerón Dorado (+20)</label>
                <label class="option-label"><input type="checkbox" name="upgrades" value="-10"> Caparazón Bowser (-10 Peso)</label>
            </div>
        </div>

        <div class="form-group">
            <label for="driverLevel">Nivel de Motor (1-5):</label>
            <input type="number" id="driverLevel" min="1" max="5" value="1">
        </div>
    </form>

    <!-- COLUMNA DERECHA: Visualización -->
    <div class="display-column">
        <!-- NUEVO: Contenedor de la imagen -->
        <div class="character-display">
            <img id="characterImage" src="" alt="Selecciona un personaje">
        </div>

        <div class="score-board">
            <div class="score-title">Poder Total del Kart</div>
            <div class="score-value" id="totalPower">0</div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="powerBar"></div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
